services:
  geant4:
    image: geant4-easy:10.7
    build:
      context: ..
      dockerfile: docker_easy_deployment/Dockerfile.technical
    restart: "no"
    container_name: geant4
    volumes:
      - "./interface:/interface:ro"
      - "./output:/work/output"
    ports:
      - "127.0.0.10:8080:8080"
    command: >
      bash -lc "
      set -e
      && source /geant4/docker_env.sh
      && mkdir -p /work/output /cluster/work/users/dsarria/SIMULATION_DATAFILES
      && ln -sfn /work/output /cluster/work/users/dsarria/SIMULATION_DATAFILES/COSMIC_THUNDER
      && rm -rf /work/COSMIC_RAY_THUNDERSTORM-Geant4
      && git clone https://github.com/davsar89/COSMIC_RAY_THUNDERSTORM-Geant4.git /work/COSMIC_RAY_THUNDERSTORM-Geant4
      && cmake -S /work/COSMIC_RAY_THUNDERSTORM-Geant4 -B /work/COSMIC_RAY_THUNDERSTORM-Geant4/build
      && cmake --build /work/COSMIC_RAY_THUNDERSTORM-Geant4/build --parallel 4
      && cd /work/COSMIC_RAY_THUNDERSTORM-Geant4/build
      && python3 python_job_local.py
      "
